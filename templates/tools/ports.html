{% extends "base.html" %}
{% block title %}{{ tool.title }} — rehnova tools{% endblock %}
{% block content %}
{% include 'tools/_shell_start.html' %}

<div class="tool-panel">
  <div class="tool-field">
    <label for="port-q">Search port or service</label>
    <input id="port-q" type="search" placeholder="443  ·  ssh  ·  rdp  ·  mysql" autocomplete="off" spellcheck="false">
  </div>
  <div class="tool-table-wrap">
    <table class="tool-table" id="port-table">
      <thead>
        <tr><th>Port</th><th>Proto</th><th>Service</th><th>Notes</th></tr>
      </thead>
      <tbody id="port-body"></tbody>
    </table>
  </div>
  <p class="tool-hint" id="port-count"></p>
</div>

{% include 'tools/_shell_end.html' %}
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/tools-ports.js') }}"></script>
{% endblock %}
