{% extends "base.html" %}
{% block title %}{{ tool.title }} — rehnova tools{% endblock %}
{% block content %}
{% include 'tools/_shell_start.html' %}

<div class="tool-panel">
  <div class="tool-field">
    <label for="cidr-in">IPv4 CIDR</label>
    <input type="text" id="cidr-in" placeholder="192.168.1.0/24" spellcheck="false">
  </div>
  <div class="tool-field">
    <label for="cidr-out">Result</label>
    <textarea id="cidr-out" rows="10" readonly placeholder="Network details…" spellcheck="false"></textarea>
  </div>
  <div class="tool-actions">
    <button type="button" class="tool-btn tool-btn--solid" id="cidr-calc">Calculate</button>
    <button type="button" class="tool-btn" id="cidr-copy">Copy</button>
  </div>
  <p class="tool-hint" id="cidr-err"></p>
</div>

{% include 'tools/_shell_end.html' %}
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/tools-cidr.js') }}"></script>
{% endblock %}
