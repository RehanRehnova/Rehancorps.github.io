{% extends "base.html" %}
{% block title %}{{ tool.title }} — rehnova tools{% endblock %}
{% block content %}
{% include 'tools/_shell_start.html' %}

<div class="tool-panel">
  <div class="tool-grid-2">
    <div class="tool-field">
      <label for="pw-len">Length</label>
      <input type="number" id="pw-len" min="8" max="128" value="20">
    </div>
    <div class="tool-field">
      <label>Character sets</label>
      <div class="tool-chips" id="pw-sets">
        <button type="button" class="tool-chip is-on" data-set="lower">a-z</button>
        <button type="button" class="tool-chip is-on" data-set="upper">A-Z</button>
        <button type="button" class="tool-chip is-on" data-set="digit">0-9</button>
        <button type="button" class="tool-chip is-on" data-set="symbol">symbols</button>
      </div>
    </div>
  </div>
  <div class="tool-field">
    <label for="pw-out">Password</label>
    <input type="text" id="pw-out" readonly placeholder="Generate…" spellcheck="false">
  </div>
  <div class="tool-actions">
    <button type="button" class="tool-btn tool-btn--solid" id="pw-gen">Generate</button>
    <button type="button" class="tool-btn" id="pw-copy">Copy</button>
  </div>
  <p class="tool-hint" id="pw-msg"></p>
</div>

{% include 'tools/_shell_end.html' %}
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/tools-password.js') }}"></script>
{% endblock %}
