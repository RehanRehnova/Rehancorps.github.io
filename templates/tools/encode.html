{% extends "base.html" %}
{% block title %}{{ tool.title }} — rehnova tools{% endblock %}
{% block content %}
{% include 'tools/_shell_start.html' %}

<div class="tool-panel">
  <div class="tool-field">
    <label>Mode</label>
    <div class="tool-chips" id="enc-mode">
      <button type="button" class="tool-chip is-on" data-v="base64">Base64</button>
      <button type="button" class="tool-chip" data-v="url">URL</button>
      <button type="button" class="tool-chip" data-v="hex">Hex</button>
    </div>
  </div>
  <div class="tool-grid-2">
    <div class="tool-field">
      <label for="enc-in">Input</label>
      <textarea id="enc-in" rows="8" placeholder="Plaintext or encoded data…" spellcheck="false"></textarea>
    </div>
    <div class="tool-field">
      <label for="enc-out">Output</label>
      <textarea id="enc-out" rows="8" readonly placeholder="Result…" spellcheck="false"></textarea>
    </div>
  </div>
  <div class="tool-actions">
    <button type="button" class="tool-btn tool-btn--solid" id="enc-encode">Encode →</button>
    <button type="button" class="tool-btn tool-btn--solid" id="enc-decode">← Decode</button>
    <button type="button" class="tool-btn" id="enc-swap">Swap</button>
    <button type="button" class="tool-btn" id="enc-copy">Copy out</button>
  </div>
  <p class="tool-hint" id="enc-err"></p>
</div>

{% include 'tools/_shell_end.html' %}
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/tools-encode.js') }}"></script>
{% endblock %}
