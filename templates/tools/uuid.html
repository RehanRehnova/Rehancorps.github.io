{% extends "base.html" %}
{% block title %}{{ tool.title }} — rehnova tools{% endblock %}
{% block content %}
{% include 'tools/_shell_start.html' %}

<div class="tool-panel">
  <div class="tool-field">
    <label>Count</label>
    <input type="number" id="uuid-n" min="1" max="50" value="5">
  </div>
  <div class="tool-field">
    <label for="uuid-out">UUIDs (v4)</label>
    <textarea id="uuid-out" rows="10" readonly placeholder="Generated UUIDs…" spellcheck="false"></textarea>
  </div>
  <div class="tool-actions">
    <button type="button" class="tool-btn tool-btn--solid" id="uuid-gen">Generate</button>
    <button type="button" class="tool-btn" id="uuid-copy">Copy all</button>
  </div>
  <p class="tool-hint" id="uuid-msg"></p>
</div>

{% include 'tools/_shell_end.html' %}
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/tools-uuid.js') }}"></script>
{% endblock %}
